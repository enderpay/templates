{% extends "base.html.twig" %}
{% block title %} {{ page.name }} {% endblock title %}
{% block content %}
  <div class="card my-3 shadow">
    <div class="card-header bg-primary text-light">
      {{ page.name }}
    </div>
    <div class="card-body">
      {{ page.content | raw }}
    </div>
    <div class="card-footer">
    </div>
  </div>
{% endblock content %}
