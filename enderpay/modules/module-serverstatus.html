<div class="card mt-3 shadow" id="module-serverstatus">
  <form>
    <div class="card-header bg-primary text-light">
      {{ module.name }}
    </div>
    <div class="card-body">
      <input type="hidden" id="server-address" value="{{ module.data.address }}">
      <input type="hidden" id="server-port" value="{{ module.data.port }}">
      <div class="mx-auto d-block text-center" id="server-status">
        <h5 class="text-center d-inline">{{ module.data.address }}{% if module.data.port %}:{{ module.data.port }}{% endif %}</h5>
      </div>
      <p class="text-center mb-0" id="server-players"></p>
    </div>
  </form>
</div>
